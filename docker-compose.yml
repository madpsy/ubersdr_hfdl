services:
  hfdl_launcher:
    container_name: hfdl
    image: madpsy/ubersdr_hfdl:latest
    restart: unless-stopped
    ports:
      - "6090:6090"
    environment:
      # Extra arguments forwarded to dumphfdl (after --)
      EXTRA_ARGS: ""
      # Uncomment and set as needed:
      # UBERSDR_URL: "http://172.20.0.1:8080"
      # PASS: ""
      # STATION: "1,2,3"
      # SYSTEM_TABLE: ""
      # FREQ_URL: ""
      # CONFIG_PASS: ""
      # SILENT: "0"
      # DRY_RUN: "0"
      #
      # IQ recording — records 30 s of raw IQ data per window as a WAV file.
      # install.sh automatically mounts ./iq_recordings:/iq_recordings and
      # creates the host directory.  To enable recording, just uncomment:
      # IQ_RECORD_DIR: "/iq_recordings"
      # IQ_RECORD_SECONDS: "30"
