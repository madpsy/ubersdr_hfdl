services:
  hfdl_launcher:
    image: madpsy/ubersdr_hfdl:latest
    restart: unless-stopped
    ports:
      - "6090:6090"
    environment:
      # Extra arguments forwarded to dumphfdl (after --)
      EXTRA_ARGS: "--output decoded:basestation:tcp:address=adsb.oarc.uk,port=32010"
      # Uncomment and set as needed:
      # UBERSDR_URL: "http://172.20.0.1:8080"
      # PASS: ""
      # STATION: "1,2,3"
      # SYSTEM_TABLE: ""
      # FREQ_URL: ""
      # CONFIG_PASS: ""
      # SILENT: "0"
      # DRY_RUN: "0"
      #
      # IQ recording — records 30 s of raw IQ data per window as a WAV file.
      # Set IQ_RECORD_DIR to the path inside the container that is volume-mounted
      # to a host directory (see the volumes section below).
      # IQ_RECORD_DIR: "/iq_recordings"
      # IQ_RECORD_SECONDS: "30"
    # volumes:
    #   # Mount a host directory to persist IQ WAV recordings.
    #   # The left-hand side is the path on the host; the right-hand side must
    #   # match IQ_RECORD_DIR above.
    #   - "./iq_recordings:/iq_recordings"
